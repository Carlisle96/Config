# Prefer VA-API hardware decoding on Intel/AMD iGPUs and AMD dGPUs.
hwdec=vaapi

# Avoid mpv 0.41's Vulkan/gpu-next decode path on Wayland; it is currently
# more fragile across Mesa/GPU combinations than VA-API + OpenGL.
gpu-api=opengl

# Fedora's desktop launcher uses pseudo-gui, whose built-in defaults include
# idle=once and force-window=yes. Override those so closed videos do not leave
# an idle mpv process behind.
idle=no
force-window=no
