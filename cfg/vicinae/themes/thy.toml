# Thy

[meta]
name = "Thy"
description = "Thyriaen Theme"
variant = "dark"                              # "dark" | "light": impacts what icon to show in some circumstances
inherits = "vicinae-dark"

[colors.core]
accent = "#7652B8"
accent_foreground = "#E9EAEB"
background = "#27292D"
foreground = "#E9EAEB"
secondary_background = "#1B1C1D"
border = "#7652B8"

[colors.main_window]
border = "#2e2e2e"
footer = { background = "colors.core.secondary_background" }

[colors.settings_window]
border = "#2e2e2e"

[colors.accents]
blue = "#7652B8"           
green = "#94B852"
magenta = "#B85294"
orange = "#B8A952"
purple = "#B85294"
red = "#B85261"
yellow = "#EEE766"
cyan = "#5294B8"

# For now, shortcuts cannot have their own dedicated background
[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "#e8e6e1"
danger = "#b9543b"
success = "#3a9c61"
placeholder = "#e8e6e1"
selection = { background = "#2f6fed", foreground = "#ffffff" }

[colors.text.links]
default = "#2f6fed"
visited = "#bc8cff"

[colors.input]
border = "#2e2e2e"
border_focus = "#2f6fed"
border_error = "#b9543b"

[colors.button.primary]
background = "#2e2e2e"
foreground = "#e8e6e1"
hover = { background = "#bb2e2e2e" }
focus = { outline = "colors.core.accent" }

[colors.list.item.hover]
foreground = "#e8e6e1"
secondary_foreground = "#e8e6e1"

[colors.list.item.selection]
background = "#2e2e2e"
foreground = "#e8e6e1"
secondary_background = "#2e2e2e"
secondary_foreground = "#e8e6e1"

[colors.grid.item]
background = "#242424"
hover = { outline = "#e8e6e1" }
selection = { outline = "#e8e6e1" }

[colors.scrollbars]
background = "#2e2e2e"

[colors.loading]
bar = "#e8e6e1"     # shown right below the search bar when something is loading
spinner = "#e8e6e1" # used by dynamic toasts